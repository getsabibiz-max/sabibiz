name: Generate Business Directory Pages

# Keeps /biz/<slug>/ pages, the /biz/ hub, and sitemap.xml in sync with the
# live published Sheet — automatically, no manual steps after setup.
on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install python-dateutil

      - name: Generate business pages
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: python scripts/generate_biz_pages.py

      - name: Commit changes if any
        run: |
          git config user.name "sabibiz-bot"
          git config user.email "actions@users.noreply.github.com"
          git add biz/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes — directory already up to date."
          else
            git commit -m "Auto-update business directory pages [skip ci]"
            git push
          fi
